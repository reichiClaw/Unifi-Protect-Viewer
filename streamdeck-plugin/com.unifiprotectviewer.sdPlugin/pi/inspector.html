<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8" />
	<title>UniFi Protect Viewer · Settings</title>
	<link rel="stylesheet" href="sdpi.css" />
</head>
<body>
	<div class="sdpi-wrapper">
		<details class="message">
			<summary>Connect this button to the UniFi Protect Viewer app running on your Mac.</summary>
		</details>

		<div class="sdpi-item">
			<div class="sdpi-item-label">Host</div>
			<input class="sdpi-item-value" id="host" placeholder="127.0.0.1" />
		</div>
		<div class="sdpi-item">
			<div class="sdpi-item-label">Port</div>
			<input class="sdpi-item-value" id="port" placeholder="8723" />
		</div>
		<div class="sdpi-item">
			<div class="sdpi-item-label">Token</div>
			<input class="sdpi-item-value" id="token" type="password" placeholder="(optional)" />
		</div>

		<div class="sdpi-item" id="refresh-row">
			<div class="sdpi-item-label"></div>
			<button class="sdpi-item-value" id="refresh">Load views &amp; cameras</button>
		</div>

		<!-- Switch View fields -->
		<div class="group" id="view-group" hidden>
			<div class="sdpi-item">
				<div class="sdpi-item-label">View</div>
				<select class="sdpi-item-value select" id="viewSelect"></select>
			</div>
			<div class="sdpi-item">
				<div class="sdpi-item-label">or Index</div>
				<input class="sdpi-item-value" id="viewIndex" placeholder="0" />
			</div>
			<div class="sdpi-item">
				<div class="sdpi-item-label">or Name</div>
				<input class="sdpi-item-value" id="viewName" placeholder="e.g. Front Yard" />
			</div>
		</div>

		<!-- Fullscreen camera fields -->
		<div class="group" id="camera-group" hidden>
			<div class="sdpi-item">
				<div class="sdpi-item-label">Camera</div>
				<select class="sdpi-item-value select" id="cameraSelect"></select>
			</div>
			<div class="sdpi-item">
				<div class="sdpi-item-label">or Index</div>
				<input class="sdpi-item-value" id="cameraIndex" placeholder="0" />
			</div>
			<div class="sdpi-item">
				<div class="sdpi-item-label">or Name</div>
				<input class="sdpi-item-value" id="cameraName" placeholder="e.g. Garage" />
			</div>
		</div>

		<p class="status" id="status"></p>
	</div>
	<script src="inspector.js"></script>
</body>
</html>
